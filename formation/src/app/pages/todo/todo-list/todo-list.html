<h1>A faire!!</h1>

<div class="card flex justify-center">
    <p-select [options]="users()" optionLabel="name" class="w-full md:w-56" (onChange)="onChangeUser($event)" />
</div>

<p-table [value]="todos()">
    <ng-template #header>
        <tr>
            <th>Id</th>
            <th>Tache</th>
            <th>Terminée ?</th>
            <th>User</th>
        </tr>
    </ng-template>
    <ng-template #body let-todo>
        <tr>
            <td>{{todo.id}}</td>
            <td>{{todo.title | uppercase}}</td>
            <td>{{todo.completed | done}}</td>
            <td>{{(getUserById(todo.userId) | async)?.name}}</td>
        </tr>
    </ng-template>
</p-table>
